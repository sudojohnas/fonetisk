<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fonetisk Alfabet</title>
    <style>
      :root {
        --bane-blue: #00458a;
        --blue-700: #00366c;
        --blue-500: #0d5eb8;
        --blue-100: #d9e9fb;
        --surface: #f2f6fb;
        --surface-2: #ffffff;
        --text: #0b1b2e;
        --muted: #5d6d82;
        --ok: #1f9d57;
        --bad: #cf3a3a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 14px;
        font-family: "Avenir Next", "Futura", "Trebuchet MS", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 0%, #ebf3ff 0%, transparent 45%),
          radial-gradient(circle at 80% 100%, #dcecff 0%, transparent 40%),
          #eef4fb;
      }

      .app {
        width: min(860px, 100%);
        border-radius: 28px;
        background: var(--surface);
        border: 2px solid #9fc0e6;
        outline: 3px solid #d7e7fa;
        box-shadow: 0 22px 54px rgba(0, 37, 84, 0.16);
        overflow: hidden;
      }

      .header {
        padding: 18px 20px 10px;
      }

      .top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .title {
        margin: 0;
        font-size: clamp(1rem, 2.6vw, 1.25rem);
        font-weight: 700;
        color: var(--bane-blue);
      }

      .progress-count {
        margin: 0;
        font-weight: 700;
      }

      .content {
        padding: 8px 20px 20px;
      }

      .card {
        background: var(--surface-2);
        border: 1px solid #cfdef1;
        border-radius: 22px;
        padding: clamp(18px, 3.5vw, 28px);
        box-shadow: 0 14px 30px rgba(0, 50, 110, 0.1);
        margin-bottom: 16px;
        text-align: center;
      }

      .letter {
        margin: 0;
        font-size: clamp(3.3rem, 11vw, 5.5rem);
        line-height: 0.95;
        color: var(--bane-blue);
      }

      .prompt {
        margin: 10px 0 0;
        font-size: clamp(1rem, 2.5vw, 1.2rem);
        font-weight: 600;
      }

      .options {
        display: grid;
        gap: 10px;
        justify-items: center;
      }

      .option {
        width: min(460px, 100%);
        min-height: 50px;
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid #cfdef1;
        background: #ffffff;
        color: var(--text);
        text-align: center;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.16s ease;
      }

      .option:hover,
      .option:focus-visible {
        border-color: #b5cbe6;
        transform: translateY(-1px);
        outline: none;
      }

      .option:disabled {
        cursor: default;
      }

      .option.selected-correct {
        border-color: var(--ok);
        box-shadow: 0 0 0 3px rgba(31, 157, 87, 0.18);
      }

      .option.selected-wrong {
        border-color: var(--bad);
        box-shadow: 0 0 0 3px rgba(207, 58, 58, 0.17);
      }

      .option.reveal-correct {
        border-color: var(--ok);
      }

      .status {
        min-height: 1.2em;
        margin: 10px 0 0;
        font-size: 0.92rem;
        color: var(--muted);
        text-align: center;
      }

      .result {
        display: none;
      }

      .result.active {
        display: block;
      }

      .result-card {
        background: var(--surface-2);
        border-radius: 20px;
        padding: 18px;
        box-shadow: 0 14px 30px rgba(0, 50, 110, 0.1);
        text-align: center;
      }

      .result h2 {
        margin: 0 0 10px;
        color: var(--bane-blue);
      }

      .stat {
        margin: 0 0 10px;
        font-weight: 600;
        font-size: clamp(1.1rem, 3.4vw, 1.4rem);
      }

      .comment {
        margin: 0;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
        justify-content: center;
      }

      .btn {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font-size: 0.97rem;
        font-weight: 700;
        cursor: pointer;
      }

      .btn-primary {
        background: var(--bane-blue);
        color: #fff;
      }

      .btn-secondary {
        background: #e0ecfa;
        color: var(--blue-700);
      }

      .btn[hidden] {
        display: none;
      }

      .footer {
        padding: 14px 20px 18px;
        font-size: 0.82rem;
        color: var(--muted);
        text-align: center;
      }

      .footer a {
        color: var(--blue-700);
      }

      @media (max-width: 640px) {
        .header {
          padding: 14px 14px 8px;
        }

        .content {
          padding: 6px 14px 14px;
        }

        .footer {
          padding: 12px 14px 14px;
        }

        .option {
          min-height: 46px;
          padding: 8px 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div class="top-row">
          <h1 class="title" id="modeTitle">Fonetisk alfabet</h1>
          <p class="progress-count" id="progress">1/29</p>
        </div>
      </header>

      <section class="content" id="quizSection">
        <article class="card">
          <p class="letter" id="letter">A</p>
          <p class="prompt">Velg riktig kodeord:</p>
        </article>
        <div class="options" id="options"></div>
        <p class="status" id="status"></p>
      </section>

      <section class="content result" id="resultSection">
        <div class="result-card">
          <h2 id="resultTitle">Resultat</h2>
          <p class="stat" id="resultStats"></p>
          <p class="comment" id="resultComment"></p>
          <div class="actions">
            <button class="btn btn-primary" id="restartBtn">Ny runde</button>
            <button class="btn btn-secondary" id="retryWrongBtn" hidden>Ta feilene på nytt</button>
          </div>
        </div>
      </section>

      <footer class="footer">
        Kilde: Forsvaret – Fonetiske alfabet
        (<a href="https://www.forsvaret.no/minside/kontaktpunkt-mot/fonetiske-alfabet" target="_blank" rel="noopener noreferrer">forsvaret.no</a>).
      </footer>
    </main>

    <script>
      const fullQuizData = [
        { letter: "A", correct: "ALFA", options: ["ALFA", "ALVA", "ALMA"] },
        { letter: "B", correct: "BRAVO", options: ["BRAVO", "BRAGE", "BRUNO"] },
        { letter: "C", correct: "CHARLIE", options: ["CHARLIE", "CHARLES", "CHAMBER"] },
        { letter: "D", correct: "DELTA", options: ["DELTA", "DANTE", "DENVER"] },
        { letter: "E", correct: "ECHO", options: ["ECHO", "ELECTRIC", "ELCO"] },
        { letter: "F", correct: "FOXTROT", options: ["FOXTROT", "FORK", "FALCON"] },
        { letter: "G", correct: "GOLF", options: ["GOLF", "GOLD", "GLOBE"] },
        { letter: "H", correct: "HOTEL", options: ["HOTEL", "HOSTEL", "HUNTER"] },
        { letter: "I", correct: "INDIA", options: ["INDIA", "INDIGO", "IRINA"] },
        { letter: "J", correct: "JULIETT", options: ["JULIETT", "JULIUS", "JULIAN"] },
        { letter: "K", correct: "KILO", options: ["KILO", "KEEPER", "KARLO"] },
        { letter: "L", correct: "LIMA", options: ["LIMA", "LINA", "LUCAS"] },
        { letter: "M", correct: "MIKE", options: ["MIKE", "MILA", "MICRO"] },
        { letter: "N", correct: "NOVEMBER", options: ["NOVEMBER", "NORMAN", "NORDEN"] },
        { letter: "O", correct: "OSCAR", options: ["OSCAR", "OLIVER", "OMEGA"] },
        { letter: "P", correct: "PAPA", options: ["PAPA", "PIPER", "PILOT"] },
        { letter: "Q", correct: "QUEBEC", options: ["QUEBEC", "QUICK", "QUARTZ"] },
        { letter: "R", correct: "ROMEO", options: ["ROMEO", "ROBIN", "RANGER"] },
        { letter: "S", correct: "SIERRA", options: ["SIERRA", "SILK", "SILVER"] },
        { letter: "T", correct: "TANGO", options: ["TANGO", "TEXAS", "TITAN"] },
        { letter: "U", correct: "UNIFORM", options: ["UNIFORM", "UNISON", "URBAN"] },
        { letter: "V", correct: "VICTOR", options: ["VICTOR", "VENUS", "VECTOR"] },
        { letter: "W", correct: "WHISKY", options: ["WHISKY", "WHISPER", "WILLOW"] },
        { letter: "X", correct: "XRAY", options: ["XRAY", "XTRA", "XENON"] },
        { letter: "Y", correct: "YANKEE", options: ["YANKEE", "YUKON", "YELLOW"] },
        { letter: "Z", correct: "ZULU", options: ["ZULU", "ZORRO", "ZENITH"] },
        { letter: "Æ", correct: "ÆRLIG", options: ["ÆRLIG", "ÆRVERD", "ÆRE"] },
        { letter: "Ø", correct: "ØSTEN", options: ["ØSTEN", "ØRN", "ØYVIND"] },
        { letter: "Å", correct: "ÅSE", options: ["ÅSE", "ÅSTA", "ÅSTE"] }
      ];

      const letterEl = document.getElementById("letter");
      const optionsEl = document.getElementById("options");
      const statusEl = document.getElementById("status");
      const progressEl = document.getElementById("progress");
      const modeTitleEl = document.getElementById("modeTitle");
      const quizSection = document.getElementById("quizSection");
      const resultSection = document.getElementById("resultSection");
      const resultTitle = document.getElementById("resultTitle");
      const resultStats = document.getElementById("resultStats");
      const resultComment = document.getElementById("resultComment");
      const restartBtn = document.getElementById("restartBtn");
      const retryWrongBtn = document.getElementById("retryWrongBtn");

      let currentQuiz = [...fullQuizData];
      let wrongQuestions = [];
      let index = 0;
      let errors = 0;
      let locked = false;
      let isRetryRound = false;
      let lastCorrectOptionIndex = -1;

      const CORRECT_DELAY = 1000;
      const WRONG_DELAY = 2500;

      function shuffle(array) {
        const clone = [...array];
        for (let i = clone.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [clone[i], clone[j]] = [clone[j], clone[i]];
        }
        return clone;
      }

      function updateProgress() {
        const current = index + 1;
        const total = currentQuiz.length;
        progressEl.textContent = `${current}/${total}`;
      }

      function renderQuestion() {
        const item = currentQuiz[index];
        letterEl.textContent = item.letter;
        statusEl.textContent = "";
        optionsEl.innerHTML = "";
        locked = false;
        updateProgress();

        let optionSet = shuffle(item.options);
        let correctIndex = optionSet.indexOf(item.correct);
        let guard = 0;

        while (correctIndex === lastCorrectOptionIndex && guard < 12) {
          optionSet = shuffle(item.options);
          correctIndex = optionSet.indexOf(item.correct);
          guard += 1;
        }

        lastCorrectOptionIndex = correctIndex;
        optionSet.forEach((choice) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "option";
          btn.textContent = choice;
          btn.addEventListener("click", () => handleAnswer(btn, choice, item));
          optionsEl.appendChild(btn);
        });
      }

      function handleAnswer(button, choice, item) {
        if (locked) return;
        locked = true;

        const buttons = [...optionsEl.querySelectorAll("button")];
        buttons.forEach((btn) => {
          btn.disabled = true;
        });

        if (choice === item.correct) {
          button.classList.add("selected-correct");
          statusEl.textContent = "Riktig.";
          scheduleNext(CORRECT_DELAY);
          return;
        }

        errors += 1;
        wrongQuestions.push(item);
        button.classList.add("selected-wrong");
        const correctButton = buttons.find((btn) => btn.textContent === item.correct);
        if (correctButton) {
          correctButton.classList.add("reveal-correct");
        }
        statusEl.textContent = `Nesten. Riktig svar er ${item.correct}.`;
        scheduleNext(WRONG_DELAY);
      }

      function scheduleNext(delay) {
        setTimeout(() => {
          index += 1;
          if (index < currentQuiz.length) {
            renderQuestion();
          } else {
            showResult();
          }
        }, delay);
      }

      function resultJoke(percentWrong) {
        if (percentWrong <= 10) return "Bra jobbet! Du har full kontroll på det fonetiske alfabetet.";
        if (percentWrong <= 25) return "Sterk runde. Du har god kontroll på det fonetiske alfabetet.";
        if (percentWrong <= 45) return "Et par runder til, så sitter alt.";
        if (percentWrong <= 65) return "Godkjent innsats. Ta et par runder til, så sitter alt.";
        return "Her må du ta noen runder til. Det fonetiske alfabetet er kjekt å kunne, så ikke gi opp!";
      }

      function showResult() {
        quizSection.style.display = "none";
        resultSection.classList.add("active");
        progressEl.textContent = "Ferdig";

        const correct = currentQuiz.length - errors;
        const percentCorrect = currentQuiz.length ? (correct / currentQuiz.length) * 100 : 0;
        const percentWrong = 100 - percentCorrect;
        if (isRetryRound && errors === 0) {
          resultTitle.style.display = "none";
          resultStats.textContent = "Der satt den!";
          resultComment.textContent = "";
        } else {
          resultTitle.style.display = "";
          resultStats.textContent = `${correct} av ${currentQuiz.length} (${Math.round(percentCorrect)}%)`;
          resultComment.textContent = resultJoke(percentWrong);
        }

        if (wrongQuestions.length > 0) {
          retryWrongBtn.hidden = false;
          retryWrongBtn.textContent = `Ta feilene på nytt (${wrongQuestions.length})`;
        } else {
          retryWrongBtn.hidden = true;
        }
      }

      function startRound(questions, retryMode) {
        currentQuiz = [...questions];
        wrongQuestions = [];
        index = 0;
        errors = 0;
        locked = false;
        isRetryRound = retryMode;
        lastCorrectOptionIndex = -1;
        modeTitleEl.textContent = "Fonetisk alfabet";
        quizSection.style.display = "block";
        resultSection.classList.remove("active");
        retryWrongBtn.hidden = true;
        renderQuestion();
      }

      restartBtn.addEventListener("click", () => {
        startRound(fullQuizData, false);
      });

      retryWrongBtn.addEventListener("click", () => {
        if (wrongQuestions.length === 0) return;
        startRound(wrongQuestions, true);
      });

      startRound(fullQuizData, false);
    </script>
  </body>
</html>
